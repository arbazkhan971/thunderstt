name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # Run tests without CGO to skip sherpa-onnx integration tests in CI.
      # Files guarded by //go:build cgo will be excluded automatically.
      - name: Run unit tests
        run: |
          CGO_ENABLED=0 go test -race -count=1 -coverprofile=coverage.out \
            -tags=!cgo \
            ./...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build binary
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-s -w \
              -X main.Version=ci \
              -X main.Commit=${{ github.sha }} \
              -X main.BuildDate=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o bin/thunderstt \
            ./cmd/thunderstt

      - name: Verify binary runs
        run: ./bin/thunderstt version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: thunderstt-${{ matrix.os }}
          path: bin/thunderstt
