version: "3.8"

services:
  thunderstt:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: thunderstt:latest
    container_name: thunderstt
    ports:
      - "8000:8000"
    volumes:
      - thunderstt-models:/root/.cache/thunderstt/models
    environment:
      - THUNDERSTT_MODEL=parakeet-tdt-0.6b-v3
      - THUNDERSTT_LOG_LEVEL=info
      - THUNDERSTT_WORKERS=4
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # Uncomment below for GPU support (requires nvidia-docker).
  # thunderstt-gpu:
